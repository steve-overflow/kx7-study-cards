<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#002366">
<title>Study Cards</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--navy:#002366;--gold:#C5960C;--gold-light:#F0D060;--bg:#0a1628;--card:#112244;--text:#f0f0f0;--text-dim:#8899bb}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.header{background:var(--navy);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--gold)}
.header h1{font-size:18px;color:var(--gold-light)}
.header .subtitle{font-size:11px;color:var(--text-dim)}
.tabs{display:flex;gap:8px}
.tabs button{background:none;border:2px solid var(--gold);color:var(--gold-light);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer}
.tabs button.active{background:var(--gold);color:var(--navy)}
.container{max-width:500px;margin:0 auto;padding:16px}
/* Flashcard */
.card{background:var(--card);border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.4);margin-bottom:16px;cursor:pointer;-webkit-user-select:none;user-select:none;transition:transform .15s}
.card:active{transform:scale(.98)}
.card img{width:100%;aspect-ratio:3/4;object-fit:cover;object-position:top;display:block;background:#1a2a4a}
.card-info{padding:20px;text-align:center;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.card-info.hidden-info{color:var(--text-dim);font-size:16px}
.card-info .name{font-size:24px;font-weight:700;color:var(--gold-light);margin-bottom:8px}
.card-info .details{font-size:16px;color:var(--text-dim)}
.card-info .details span{margin:0 6px}
.nav-row{display:flex;gap:12px;justify-content:center;margin:16px 0}
.nav-row button{background:var(--navy);border:2px solid var(--gold);color:var(--gold-light);padding:12px 28px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;min-width:100px}
.nav-row button:active{background:var(--gold);color:var(--navy)}
.progress-text{text-align:center;color:var(--text-dim);font-size:14px;margin-bottom:12px}
/* Quiz */
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.quiz-options button{background:var(--card);border:2px solid var(--gold);color:var(--text);padding:16px 12px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
.quiz-options button:active{transform:scale(.97)}
.quiz-options button.correct{background:#1a6b2a;border-color:#2ecc40;color:#fff}
.quiz-options button.wrong{background:#6b1a1a;border-color:#e74c3c;color:#fff}
.score-bar{display:flex;justify-content:space-between;align-items:center;background:var(--card);padding:12px 16px;border-radius:12px;margin-bottom:16px}
.score-bar .score{font-size:20px;font-weight:700;color:var(--gold-light)}
.score-bar .label{font-size:12px;color:var(--text-dim)}
/* Progress */
.progress-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.progress-item{background:var(--card);border-radius:12px;padding:10px;display:flex;align-items:center;gap:10px}
.progress-item img{width:48px;height:48px;border-radius:50%;object-fit:cover;object-position:top}
.progress-item .pi-name{font-size:13px;font-weight:600}
.progress-item .pi-stat{font-size:11px;color:var(--text-dim)}
.progress-item.mastered{border:2px solid #2ecc40}
.progress-item.struggling{border:2px solid #e74c3c}
.progress-item.unseen{border:2px solid #555}
.legend{display:flex;gap:16px;justify-content:center;margin-bottom:16px;font-size:12px;color:var(--text-dim)}
.legend span::before{content:'';display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;vertical-align:middle}
.legend .l-mastered::before{background:#2ecc40}
.legend .l-struggling::before{background:#e74c3c}
.legend .l-unseen::before{background:#555}
.hidden{display:none!important}
.reset-btn{background:none;border:1px solid #555;color:var(--text-dim);padding:8px 16px;border-radius:8px;font-size:12px;cursor:pointer;margin-top:16px;display:block;margin-left:auto;margin-right:auto}
.img-placeholder{width:100%;aspect-ratio:3/4;background:#1a2a4a;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:14px}

#pin-gate{position:fixed;top:0;left:0;right:0;bottom:0;background:#0a1628;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:40px 20px}
#pin-gate h2{color:#C5960C;margin-bottom:8px;font-size:24px}
#pin-gate p{color:#8899bb;margin-bottom:24px;font-size:14px}
#pin-gate input{background:#112244;border:2px solid #C5960C;color:#f0f0f0;padding:16px 24px;border-radius:12px;font-size:28px;text-align:center;width:180px;letter-spacing:8px;outline:none}
#pin-gate input:focus{border-color:#F0D060;box-shadow:0 0 20px rgba(197,150,12,0.3)}
#pin-gate .err{color:#e74c3c;font-size:13px;margin-top:12px;min-height:20px}
</style>
</head>
<body>
<div id="pin-gate">
<h2>🏐</h2>
<p>Enter PIN</p>
<input type="tel" id="pin-input" maxlength="4" autofocus autocomplete="off" inputmode="numeric" pattern="[0-9]*">
<div class="err" id="pin-err"></div>
</div>
<div class="header">
 <div><h1>🏐 Berry Vikings</h1><div class="subtitle">Beach Volleyball Flashcards</div></div>
 <div class="tabs">
  <button id="tab-flash" class="active" onclick="switchTab('flash')">Cards</button>
  <button id="tab-quiz" onclick="switchTab('quiz')">Quiz</button>
  <button id="tab-progress" onclick="switchTab('progress')">Stats</button>
 </div>
</div>

<div class="container" id="view-flash">
 <div class="progress-text" id="flash-progress"></div>
 <div class="card" id="flash-card" onclick="flipCard()">
  <img id="flash-img" src="" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
  <div class="img-placeholder" style="display:none">📷 No photo</div>
  <div class="card-info hidden-info" id="flash-info">Tap to reveal</div>
 </div>
 <div class="nav-row">
  <button onclick="prevCard()">← Prev</button>
  <button onclick="shuffleDeck()">🔀 Shuffle</button>
  <button onclick="nextCard()">Next →</button>
 </div>
</div>

<div class="container hidden" id="view-quiz">
 <div class="score-bar">
  <div><div class="label">Score</div><div class="score" id="quiz-score">0 / 0</div></div>
  <div><div class="label">Streak</div><div class="score" id="quiz-streak">0 🔥</div></div>
  <button onclick="startQuiz()" style="background:var(--gold);color:var(--navy);border:none;padding:8px 16px;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer">New Round</button>
 </div>
 <div class="card" style="cursor:default">
  <img id="quiz-img" src="" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
  <div class="img-placeholder" style="display:none">📷 No photo</div>
 </div>
 <div class="quiz-options" id="quiz-options"></div>
</div>

<div class="container hidden" id="view-progress">
 <div class="legend">
  <span class="l-mastered">Mastered (3+)</span>
  <span class="l-struggling">Struggling</span>
  <span class="l-unseen">Unseen</span>
 </div>
 <div class="progress-grid" id="progress-grid"></div>
 <button class="reset-btn" onclick="resetProgress()">Reset All Progress</button>
</div>

<script>
const ROSTER=[
{name:"Kara Schmit",num:1,pos:"Def",year:"Sr.",type:"player"},
{name:"Becky Blaydes",num:2,pos:"Spl/Def",year:"Jr.",type:"player"},
{name:"Riley Kessler",num:3,pos:"D",year:"Fr.",type:"player"},
{name:"Grace Mau",num:4,pos:"B",year:"Jr.",type:"player"},
{name:"Kaylee Howell",num:5,pos:"Spl",year:"Jr.",type:"player"},
{name:"Ailee England",num:6,pos:"Spl",year:"So.",type:"player"},
{name:"Madie Whitehead",num:7,pos:"B",year:"Jr.",type:"player"},
{name:"Ava Brovet",num:8,pos:"Spl",year:"Fr.",type:"player"},
{name:"Keira Kruk",num:9,pos:"Def/Spl",year:"Jr.",type:"player"},
{name:"Hope Kimsey",num:10,pos:"B",year:"So.",type:"player"},
{name:"Kat Kelyman",num:11,pos:"Def",year:"Sr.",type:"player"},
{name:"Maddie Dahl",num:12,pos:"-",year:"So.",type:"player"},
{name:"Lura Underwood",num:16,pos:"Spl/Def",year:"Sr.",type:"player"},
{name:"Hannah Hagen",num:18,pos:"D",year:"Fr.",type:"player"},
{name:"Maddi Hoffman",num:22,pos:"Spl",year:"Fr.",type:"player"},
{name:"Ryn Gaertner",num:24,pos:"Spl",year:"Jr.",type:"player"},
{name:"Sabine Rudolph",num:25,pos:"Spl",year:"Jr.",type:"player"},
{name:"Cadence Maxfield",num:null,pos:"-",year:"Sr.",type:"player"},
{name:"Caitlyn Moriarty",num:null,pos:"Head Coach",year:null,type:"coach"},
{name:"Rachel Ford",num:null,pos:"Assistant Coach",year:null,type:"coach"},
{name:"Molly Bergin",num:null,pos:"Assistant Coach",year:null,type:"coach"}
];

function imgUrl(p){
 const[first,...rest]=p.name.split(' ');
 return`https://berryvikings.com/images/2026/1/21/Headshots_${first}_${rest.join('_')}.jpg`;
}

// Progress stored in localStorage
function getProgress(){
 try{return JSON.parse(localStorage.getItem('vb-progress'))||{}}catch(e){return{}}
}
function saveProgress(p){localStorage.setItem('vb-progress',JSON.stringify(p))}
function recordResult(name,correct){
 const p=getProgress();
 if(!p[name])p[name]={right:0,wrong:0};
 correct?p[name].right++:p[name].wrong++;
 saveProgress(p);
}
function resetProgress(){if(confirm('Reset all progress?')){localStorage.removeItem('vb-progress');renderProgress()}}

// Shuffle
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

// FLASHCARD MODE
let deck=shuffle(ROSTER),deckIdx=0,revealed=false;

function renderFlashcard(){
 const p=deck[deckIdx];
 document.getElementById('flash-img').style.display='';
 document.getElementById('flash-img').nextElementSibling.style.display='none';
 document.getElementById('flash-img').src=imgUrl(p);
 document.getElementById('flash-img').alt=p.name;
 const info=document.getElementById('flash-info');
 if(revealed){
  info.className='card-info';
  const numStr=p.num?`#${p.num}`:'';
  const yearStr=p.year||'';
  info.innerHTML=`<div class="name">${p.name}</div><div class="details"><span>${numStr}</span><span>${p.pos}</span><span>${yearStr}</span></div>`;
 }else{
  info.className='card-info hidden-info';
  info.innerHTML='Tap to reveal';
 }
 document.getElementById('flash-progress').textContent=`${deckIdx+1} / ${deck.length}`;
}
function flipCard(){revealed=!revealed;renderFlashcard()}
function nextCard(){deckIdx=(deckIdx+1)%deck.length;revealed=false;renderFlashcard()}
function prevCard(){deckIdx=(deckIdx-1+deck.length)%deck.length;revealed=false;renderFlashcard()}
function shuffleDeck(){deck=shuffle(ROSTER);deckIdx=0;revealed=false;renderFlashcard()}

// Swipe support
let touchStartX=0;
document.addEventListener('touchstart',e=>{touchStartX=e.changedTouches[0].screenX},{passive:true});
document.addEventListener('touchend',e=>{
 const dx=e.changedTouches[0].screenX-touchStartX;
 if(Math.abs(dx)>60){
  const view=document.querySelector('.container:not(.hidden)');
  if(view&&view.id==='view-flash'){dx<0?nextCard():prevCard()}
 }
},{passive:true});

// QUIZ MODE
let quizDeck=[],quizIdx=0,quizCorrect=0,quizTotal=0,quizStreak=0,quizLocked=false;

function startQuiz(){quizDeck=shuffle(ROSTER);quizIdx=0;quizCorrect=0;quizTotal=0;quizStreak=0;updateScore();renderQuiz()}
function updateScore(){
 document.getElementById('quiz-score').textContent=`${quizCorrect} / ${quizTotal}`;
 document.getElementById('quiz-streak').textContent=`${quizStreak} 🔥`;
}
function renderQuiz(){
 if(quizIdx>=quizDeck.length){quizIdx=0;quizDeck=shuffle(ROSTER)}
 quizLocked=false;
 const p=quizDeck[quizIdx];
 document.getElementById('quiz-img').style.display='';
 document.getElementById('quiz-img').nextElementSibling.style.display='none';
 document.getElementById('quiz-img').src=imgUrl(p);
 // Pick 3 wrong answers
 const others=ROSTER.filter(x=>x.name!==p.name);
 const wrong=shuffle(others).slice(0,3);
 const opts=shuffle([p,...wrong]);
 const container=document.getElementById('quiz-options');
 container.innerHTML='';
 opts.forEach(o=>{
  const btn=document.createElement('button');
  btn.textContent=o.name;
  btn.onclick=()=>answerQuiz(btn,o.name===p.name,p.name);
  container.appendChild(btn);
 });
}
function answerQuiz(btn,correct,correctName){
 if(quizLocked)return;
 quizLocked=true;quizTotal++;
 if(correct){
  btn.classList.add('correct');quizCorrect++;quizStreak++;
  recordResult(correctName,true);
 }else{
  btn.classList.add('wrong');quizStreak=0;
  recordResult(correctName,false);
  // Highlight correct
  document.querySelectorAll('#quiz-options button').forEach(b=>{if(b.textContent===correctName)b.classList.add('correct')});
 }
 updateScore();
 setTimeout(()=>{quizIdx++;renderQuiz()},correct?800:1500);
}

// PROGRESS VIEW
function renderProgress(){
 const prog=getProgress();
 const grid=document.getElementById('progress-grid');
 grid.innerHTML='';
 ROSTER.forEach(p=>{
  const s=prog[p.name]||{right:0,wrong:0};
  const total=s.right+s.wrong;
  let cls='unseen';
  if(total>0){cls=s.right>=3&&s.right>s.wrong?'mastered':'struggling';if(s.right>0&&s.wrong===0&&total<3)cls='unseen'}
  const div=document.createElement('div');
  div.className=`progress-item ${cls}`;
  div.innerHTML=`<img src="${imgUrl(p)}" alt="" onerror="this.style.display='none'"><div><div class="pi-name">${p.name}</div><div class="pi-stat">${s.right}✓ ${s.wrong}✗</div></div>`;
  grid.appendChild(div);
 });
}

// TAB SWITCHING
function switchTab(tab){
 document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
 document.getElementById('tab-'+tab).classList.add('active');
 ['flash','quiz','progress'].forEach(v=>document.getElementById('view-'+v).classList.toggle('hidden',v!==tab));
 if(tab==='progress')renderProgress();
 if(tab==='quiz'&&quizDeck.length===0)startQuiz();
}

// Init
renderFlashcard();
</script>

<script>
(function(){
 const H='08b61';
 if(sessionStorage.getItem('vba')==='1'){document.getElementById('pin-gate').remove();return}
 document.querySelectorAll('.header,.container').forEach(e=>e.style.display='none');
 const inp=document.getElementById('pin-input');
 inp.addEventListener('input',async function(){
  if(inp.value.length===4){
   const buf=await crypto.subtle.digest('SHA-1',new TextEncoder().encode('vbfc:'+inp.value));
   const hex=[...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
   if(hex.startsWith(H)){
    sessionStorage.setItem('vba','1');
    document.getElementById('pin-gate').remove();
    document.querySelectorAll('.header,.container').forEach(e=>e.style.display='');
   }else{
    document.getElementById('pin-err').textContent='Wrong PIN';
    inp.value='';inp.focus();
   }
  }else{document.getElementById('pin-err').textContent=''}
 });
})();
</script>

</body>
</html>
